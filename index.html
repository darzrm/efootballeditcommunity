<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eFoodico - Community</title>
  <link rel="shortcut icon" href="./assets/images/eec.png" type="image/x-icon">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main>
    <aside class="sidebar" data-sidebar>
      <div class="sidebar-info">
        <figure class="avatar-box">
          <img src="./assets/images/eec.png" alt="eFoodico" width="80">
        </figure>
        <div class="info-content">
          <h1 class="name">eFoodico</h1>
          <p class="title">Keep Improving!</p>
        </div>
      </div>
    </aside>

    <div class="main-content">
      <nav class="navbar">
        <ul class="navbar-list">
          <li class="navbar-item"><button class="navbar-link active" data-nav-link="about">Home</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="blog">Blog</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="account">Account</button></li>
        </ul>
      </nav>

      <article class="about active" data-page="about">
        <header><h2 class="h2 article-title">About</h2></header>
        <section class="about-text">
          <p>Selamat datang di eFoodico Community. Tempat berkumpulnya para kreator.</p>
        </section>
      </article>

      <article class="blog" data-page="blog">
        <header><h2 class="h2 article-title">Blog</h2></header>
        <section class="blog-posts" id="blog-list-container">
          <ul class="blog-posts-list" id="posts-list">
            </ul>
        </section>

        <section id="blog-detail" style="display: none;">
          <button class="form-btn" id="back-to-blog"><span>&larr; Kembali</span></button>
          <div id="post-full-content" class="content-detail"></div>
          <div class="separator"></div>
          <div class="comment-section">
            <h3 class="h3">Komentar</h3>
            <div class="contact-form">
              <textarea id="comment-input" class="form-input" placeholder="Tulis komentar..."></textarea>
              <button class="form-btn" id="submit-comment">Kirim</button>
            </div>
            <div id="comments-display-container"></div>
          </div>
        </section>
      </article>

      <article class="account" data-page="account">
        <header><h2 class="h2 article-title">Account</h2></header>
        <div id="auth-ui">
          <section class="contact-form">
            <div class="input-wrapper">
              <input type="email" id="acc-email" class="form-input" placeholder="Email Address" required>
              <input type="password" id="acc-password" class="form-input" placeholder="Password" required>
            </div>
            <div class="btn-group">
              <button class="form-btn" id="btn-login">Login</button>
              <button class="form-btn btn-secondary" id="btn-register">Register</button>
            </div>
          </section>
        </div>

        <div id="profile-ui" style="display: none;">
          <div class="content-card">
            <p><strong>Username:</strong> <span id="display-username"></span></p>
            <p><strong>Email:</strong> <span id="display-email"></span></p>
            <p><strong>Points:</strong> <span id="display-points">0</span> pts</p>
            <button class="form-btn btn-logout" id="btn-logout">Logout</button>
          </div>
        </div>
      </article>
    </div>
  </main>
  <script src="./assets/js/script.js"></script>
</body>
</html>
