<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eFoodico - Community</title>
  <link rel="shortcut icon" href="./assets/images/eec.png" type="image/x-icon">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <main>
    <aside class="sidebar" data-sidebar>
      <div class="sidebar-info">
        <figure class="avatar-box">
          <img src="./assets/images/eec.png" alt="eFoodico" width="80">
        </figure>
        <div class="info-content">
          <h1 class="name" style="color: #ffffff;">eFoodico</h1>
          <p class="title" style="color: #ffffff; opacity: 0.8;">Keep Improving!</p>
        </div>
      </div>
    </aside>

    <div class="main-content">
      <nav class="navbar">
        <ul class="navbar-list">
          <li class="navbar-item"><button class="navbar-link active" data-nav-link="about">Home</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="event">Events</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="blog">News</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="account">Account</button></li>
        </ul>
      </nav>

      <article class="about active" data-page="about">
        <header><h2 class="h2 article-title" style="color: #ffffff;">About</h2></header>
        <section class="about-text">
          <p style="color: #ffffff;">Selamat datang di eFoodico Community.</p>
        </section>
      </article>

      <article class="event" data-page="event">
        <header><h2 class="h2 article-title" style="color: #ffffff;">Leaderboard</h2></header>
        <div class="leaderboard-container">
          <table class="leaderboard-table">
            <thead>
              <tr style="color: #ffffff;">
                <th>Rank</th>
                <th>Username</th>
                <th>Points</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="leaderboard-body" style="color: #ffffff;"></tbody>
          </table>
        </div>
      </article>

      <article class="blog" data-page="blog">
        <header><h2 class="h2 article-title" style="color: #ffffff;">News</h2></header>
        <div id="blog-list-container">
          <ul class="blog-posts-list" id="posts-list">
            </ul>
        </div>
        <div id="blog-detail" style="display: none;">
          <button class="form-btn" id="back-to-blog" style="color: #ffffff;">Kembali</button>
          <div id="post-full-content" style="color: #ffffff; margin-top: 20px;"></div>
          <div class="separator"></div>
          <div id="wa-comments-container"></div>
        </div>
      </article>

      <article class="account" data-page="account">
        <header><h2 class="h2 article-title" style="color: #ffffff;">Account</h2></header>
        <div id="auth-ui">
          <div class="contact-form">
            <input type="email" id="login-email" class="form-input" placeholder="Email" required>
            <input type="password" id="login-password" class="form-input" placeholder="Password" required>
            <button class="form-btn" id="btn-login" style="margin-top: 10px;">Login</button>
          </div>
        </div>
        <div id="profile-ui" style="display: none; color: #ffffff;">
          <div class="content-card">
            <p>User: <span id="user-name" style="color: #ffffff;"></span></p>
            <p>Role: <span id="user-role" style="color: #ffffff;"></span></p>
            <p>Points: <span id="user-points" style="color: #ffffff;"></span></p>
          </div>
          <button class="form-btn" id="btn-logout" style="margin-top: 20px; background: #ff4d4d;">Logout</button>
        </div>
      </article>
    </div>
  </main>
  <script src="./assets/js/script.js"></script>
</body>
</html>
