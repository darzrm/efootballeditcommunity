<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eFoodico - Community</title>
  <link rel="shortcut icon" href="./assets/images/eec.png" type="image/x-icon">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <main>
    <aside class="sidebar" data-sidebar>
      <div class="sidebar-info">
        <figure class="avatar-box">
          <img src="./assets/images/eec.png" alt="eFoodico" width="80">
        </figure>
        <div class="info-content">
          <h1 class="name" style="color: #ffffff;">eFoodico</h1>
          <p class="title" style="color: #ffffff; opacity: 0.8;">Keep Improving!</p>
        </div>
      </div>
    </aside>

    <div class="main-content">
      <nav class="navbar">
        <ul class="navbar-list">
          <li class="navbar-item"><button class="navbar-link active" data-nav-link="about">Home</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="event">Events</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="blog">News</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="account">Account</button></li>
        </ul>
      </nav>

      <article class="about active" data-page="about">
        <header><h2 class="h2 article-title" style="color: #ffffff;">About</h2></header>
        <section class="about-text">
          <p style="color: #ffffff;">Selamat datang di komunitas eFoodico. Tempat berkumpulnya para kreator.</p>
        </section>
      </article>

      <article class="event" data-page="event">
        <header><h2 class="h2 article-title" style="color: #ffffff;">Leaderboard</h2></header>
        <section class="about-text">
          <div class="leaderboard-container" style="overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; color: #ffffff;">
              <thead>
                <tr style="border-bottom: 1px solid var(--jet);">
                  <th style="padding: 15px; text-align: left;">Rank</th>
                  <th style="padding: 15px; text-align: left;">Username</th>
                  <th style="padding: 15px; text-align: left;">Points</th>
                  <th style="padding: 15px; text-align: left;">Status</th>
                </tr>
              </thead>
              <tbody id="leaderboard-body">
                </tbody>
            </table>
          </div>
        </section>
      </article>

      <article class="blog" data-page="blog">
        <header><h2 class="h2 article-title" style="color: #ffffff;">Community News</h2></header>
        
        <div id="blog-list-container">
          <ul class="blog-posts-list" id="posts-list">
            </ul>
        </div>

        <div id="blog-detail" style="display: none;">
          <button class="form-btn" id="back-to-blog" style="width: auto; margin-bottom: 20px; color: #ffffff;">
             <span>&larr; Kembali</span>
          </button>
          <div id="post-full-content" style="color: #ffffff; line-height: 1.6;"></div>
          
          <div class="separator" style="margin: 30px 0;"></div>
          
          <div class="comment-section">
            <h3 class="h3" style="color: #ffffff; margin-bottom: 20px;">Comments</h3>
            <div class="contact-form">
              <textarea id="comment-input" class="form-input" placeholder="Tulis komentar..." style="color: #ffffff;"></textarea>
              <button class="form-btn" id="submit-comment" style="margin-top: 10px;">Kirim</button>
            </div>
            <div id="wa-comments-container" style="margin-top: 30px;"></div>
          </div>
        </div>
      </article>

      <article class="account" data-page="account">
        <header><h2 class="h2 article-title" style="color: #ffffff;">Account</h2></header>
        
        <div id="auth-ui">
          <div class="contact-form">
            <div class="input-wrapper">
              <input type="email" id="login-email" class="form-input" placeholder="Email Address" required style="color: #ffffff;">
              <input type="password" id="login-password" class="form-input" placeholder="Password" required style="color: #ffffff;">
            </div>
            <button class="form-btn" id="btn-login" style="margin-top: 10px;">Login</button>
          </div>
        </div>

        <div id="profile-ui" style="display: none;">
          <section class="about-text">
            <div class="content-card" style="padding: 25px; background: var(--bg-gradient-jet); border-radius: 14px; border: 1px solid var(--jet);">
              <p style="color: #ffffff; margin-bottom: 12px;"><strong>Username:</strong> <span id="user-name"></span></p>
              <p style="color: #ffffff; margin-bottom: 12px;"><strong>Role:</strong> <span id="user-role"></span></p>
              <p style="color: #ffffff; margin-bottom: 12px;"><strong>Points:</strong> <span id="user-points">0</span> pts</p>
            </div>
            <button class="form-btn" id="btn-logout" style="margin-top: 20px; background: #d63031; color: #ffffff;">Logout Akun</button>
          </section>
        </div>
      </article>

    </div>
  </main>

  <script src="./assets/js/script.js"></script>
</body>
</html>
