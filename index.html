<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eFoodico - Community</title>
  <link rel="shortcut icon" href="./assets/images/eec.png" type="image/x-icon">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <main>
    <aside class="sidebar" data-sidebar>
      <div class="sidebar-info">
        <figure class="avatar-box">
          <img src="./assets/images/eec.png" alt="eFoodico" width="80">
        </figure>
        <div class="info-content">
          <h1 class="name" title="eFoodico">eFoodico</h1>
          <p class="title">Keep Improving!</p>
        </div>
        <button class="info_more-btn" data-sidebar-btn>
          <span>Show Contacts</span>
          <ion-icon name="chevron-down"></ion-icon>
        </button>
      </div>
    </aside>

    <div class="main-content">
      <nav class="navbar">
        <ul class="navbar-list">
          <li class="navbar-item"><button class="navbar-link active" data-nav-link="about">Home</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="event">Events</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="blog">News</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="account">Account</button></li>
        </ul>
      </nav>

      <article class="about active" data-page="about">
        <header><h2 class="h2 article-title">About</h2></header>
        <section class="about-text">
          <p>Selamat datang di eFoodico Community. Tempat berbagi inspirasi desain dan editing.</p>
        </section>
      </article>

      <article class="event" data-page="event">
        <header><h2 class="h2 article-title">Leaderboard</h2></header>
        <div class="leaderboard-container">
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Username</th>
                <th>Points</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="leaderboard-body">
              </tbody>
          </table>
        </div>
      </article>

      <article class="blog" data-page="blog">
        <header><h2 class="h2 article-title">Community News</h2></header>
        
        <div id="blog-list-container">
          <ul class="blog-posts-list" id="posts-list">
            </ul>
        </div>

        <div id="blog-detail" style="display: none;">
          <button class="form-btn" id="back-to-blog" style="width: auto; margin-bottom: 20px;">
            <ion-icon name="arrow-back-outline"></ion-icon> <span>Kembali</span>
          </button>
          <div id="post-full-content"></div>
          
          <div class="separator"></div>
          <div class="comment-section">
            <h3 class="h3">Comments</h3>
            <div class="yt-form">
              <textarea id="comment-input" class="form-input" placeholder="Tulis komentar..."></textarea>
              <button class="form-btn" id="submit-comment">Kirim</button>
            </div>
            <div id="wa-comments-container"></div>
          </div>
        </div>
      </article>

      <article class="account" data-page="account">
        <header><h2 class="h2 article-title">Account</h2></header>
        
        <div id="auth-ui">
          <section class="contact-form">
            <div class="input-wrapper">
              <input type="email" id="email" class="form-input" placeholder="Email Address" required>
              <input type="password" id="password" class="form-input" placeholder="Password" required>
            </div>
            <button class="form-btn" id="login-btn">Login</button>
            <p style="text-align: center; margin: 15px 0; color: var(--light-gray);">Atau</p>
            <button class="form-btn" id="regis-btn" style="background: var(--onyx);">Register</button>
          </section>
        </div>

        <div id="profile-ui" style="display: none;">
          <div class="about-text">
            <div class="content-card" style="padding: 20px; background: var(--border-gradient-onyx); border-radius: 12px;">
              <p><strong>Username:</strong> <span id="user-name" style="color: var(--orange-yellow-crayola)">-</span></p>
              <p><strong>Role:</strong> <span id="user-role">-</span></p>
              <p><strong>Points:</strong> <span id="user-points">0</span> pts</p>
              <p><strong>Member Since:</strong> <span id="user-join">-</span></p>
            </div>
            <button class="form-btn" id="logout-btn" style="margin-top: 20px; background: #e03131;">Logout</button>
          </div>
        </div>
      </article>

    </div>
  </main>

  <script src="./assets/js/script.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>
</html>
