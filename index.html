<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eFoodico - Community</title>
  <link rel="shortcut icon" href="./assets/images/eec.png" type="image/x-icon">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <main>
    <aside class="sidebar" data-sidebar>
      <div class="sidebar-info">
        <figure class="avatar-box">
          <img src="./assets/images/eec.png" alt="eFoodico" width="80">
        </figure>
        <div class="info-content">
          <h1 class="name" style="color: #ffffff;">eFoodico</h1>
          <p class="title" style="color: #ffffff; opacity: 0.8;">Keep Improving!</p>
        </div>
      </div>
    </aside>

    <div class="main-content">
      <nav class="navbar">
        <ul class="navbar-list">
          <li class="navbar-item"><button class="navbar-link active" data-nav-link="about">Home</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="blog">Blog</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="account">Account</button></li>
        </ul>
      </nav>

      <article class="about active" data-page="about">
        <header><h2 class="h2 article-title" style="color: #ffffff;">About</h2></header>
        <section class="about-text">
          <p style="color: #ffffff;">Selamat datang di eFoodico Community. Tempat berbagi inspirasi desain dan teknik jaringan.</p>
        </section>
      </article>

      <article class="blog" data-page="blog">
        <header><h2 class="h2 article-title" style="color: #ffffff;">Blog</h2></header>
        
        <section class="blog-posts" id="blog-list-container">
          <ul class="blog-posts-list" id="posts-list">
            </ul>
        </section>

        <section id="blog-detail" style="display: none;">
          <button class="form-btn" id="back-to-blog" style="width: auto; margin-bottom: 25px; color: #ffffff; background: var(--onyx);">
            &larr; Kembali
          </button>
          
          <div id="post-full-content" style="color: #ffffff;"></div>
          
          <div class="separator" style="margin: 30px 0;"></div>
          
          <div class="comment-section">
            <h3 class="h3" style="color: #ffffff; margin-bottom: 20px;">Komentar</h3>
            <div class="contact-form">
              <textarea id="comment-input" class="form-input" placeholder="Tulis komentar..." style="color: #ffffff;"></textarea>
              <button class="form-btn" id="submit-comment" style="margin-top: 10px;">Kirim</button>
            </div>
            <div id="comments-display-container" style="margin-top: 25px;"></div>
          </div>
        </section>
      </article>

      <article class="account" data-page="account">
        <header><h2 class="h2 article-title" style="color: #ffffff;">Account</h2></header>
        
        <div id="auth-ui">
          <section class="contact-form">
            <div class="input-wrapper">
              <input type="email" id="acc-email" class="form-input" placeholder="Email Address" required style="color: #ffffff;">
              <input type="password" id="acc-password" class="form-input" placeholder="Password" required style="color: #ffffff;">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
              <button class="form-btn" id="btn-login">Login</button>
              <button class="form-btn" id="btn-register" style="background: var(--onyx);">Register</button>
            </div>
          </section>
        </div>

        <div id="profile-ui" style="display: none;">
          <section class="about-text">
            <div class="content-card" style="padding: 25px; border: 1px solid var(--jet); border-radius: 14px; background: var(--bg-gradient-jet);">
              <p style="color: #ffffff; margin-bottom: 12px;"><strong>Username:</strong> <span id="display-username"></span></p>
              <p style="color: #ffffff; margin-bottom: 12px;"><strong>Email:</strong> <span id="display-email"></span></p>
              <p style="color: #ffffff; margin-bottom: 12px;"><strong>Points:</strong> <span id="display-points">0</span> pts</p>
            </div>
            <button class="form-btn" id="btn-logout" style="margin-top: 20px; background: #e03131; color: #ffffff;">Logout</button>
          </section>
        </div>
      </article>
    </div>
  </main>

  <script src="./assets/js/script.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>
</html>
